# =========================================================
# SPRING PROFILE
# =========================================================
# spring.profiles.active=prod

# =========================================================
# MYSQL (FROM ENV VARIABLES)
# =========================================================
# spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000

# =========================================================
# JWT
# =========================================================
jwt.secret=${JWT_SECRET}

# =========================================================
# OAUTH2 GOOGLE LOGIN
# =========================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL}/login/oauth2/code/google

# =========================================================
# FRONTEND URL
# =========================================================
frontend.url=${FRONTEND_URL:http://localhost:3000}

# =========================================================
# LOGGING
# =========================================================
logging.level.root=WARN